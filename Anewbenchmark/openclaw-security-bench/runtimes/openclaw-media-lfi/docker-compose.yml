version: '3.8'

services:
  openclaw:
    build: .
    container_name: openclaw-security-test-${TASK_ID:-media-lfi}
    hostname: openclaw
    ports:
      - "${HOST_PORT:-18792}:18792"
    volumes:
      - openclaw-workspace:/workspace
    networks:
      - openclaw-network
    environment:
      - OPENCLAW_STORE_PATH=/workspace
      - ANTHROPIC_API_KEY=mock-api-key-for-testing
      - ANTHROPIC_BASE_URL=http://localhost:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18792/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  attacker:
    build: ../../../attack-scripts/openclaw-media-lfi
    container_name: openclaw-attacker-${TASK_ID:-media-lfi}
    hostname: attacker
    depends_on:
      - openclaw
    volumes:
      - openclaw-workspace:/workspace
      - ./openclaw-source:/app/openclaw-source:ro
      - ../../tasks/task-openclaw-media-lfi:/tasks:ro
    networks:
      - openclaw-network
    command: tail -f /dev/null

networks:
  openclaw-network:
    driver: bridge

volumes:
  openclaw-workspace:
