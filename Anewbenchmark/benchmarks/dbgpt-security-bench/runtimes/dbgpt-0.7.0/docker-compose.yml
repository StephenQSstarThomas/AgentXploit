# Docker Compose for DB-GPT 0.7.0 Security Testing
# CVE-2025-51458 (SQL Injection), CVE-2025-51459 (Plugin RCE), CVE-2025-6772 (Path Traversal)
#
# Project name is unique per TASK_ID and optional RUN_ID.
# Set RUN_ID to allow the same task to run concurrently:
#   export RUN_ID=$(date +%s) && export TASK_ID=cve-2025-51458 && docker compose up -d
name: dbgpt-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}

services:
  dbgpt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dbgpt-security-test-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}
    environment:
      - TASK_ID=${TASK_ID}
      - PORT=5670
    working_dir: /workspace
    networks:
      - exploit_net
      - llm_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5670/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  attack:
    build:
      context: .
      dockerfile: Dockerfile.attacker
    container_name: dbgpt-attacker-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}
    working_dir: /workspace
    environment:
      - TARGET_URL=http://dbgpt-security-test-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}:5670
      - TARGET_CONTAINER=dbgpt-security-test-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}
    networks:
      - exploit_net

networks:
  # Internal network: attacker <-> target only, no internet access
  exploit_net:
    internal: true

  # Non-internal: target needs this for LLM API calls
  llm_net:
    driver: bridge
