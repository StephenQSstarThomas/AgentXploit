# Docker Compose for llama-index-0.7.13 Security Testing
# CVE-2023-39662 (PandasQueryEngine RCE)
#
# Project name unique per TASK_ID and optional RUN_ID.
# Set RUN_ID to allow concurrent same-task runs:
#   export RUN_ID=$(date +%s) && export TASK_ID=<task-suffix> && docker compose up -d
name: llamaindex_llama_index_0_7_13_${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}

services:
  llamaindex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llamaindex-security-test-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}
    command: sleep infinity
    environment:
      - TASK_ID=${TASK_ID}
      - PORT=8080
      - PYTHONUNBUFFERED=1
    working_dir: /app/llama-index-source
    networks:
      - exploit_net
      - llm_net

  attack:
    build:
      context: .
      dockerfile: Dockerfile.attacker
    container_name: llamaindex-attacker-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}
    working_dir: /workspace
    environment:
      - TARGET_URL=http://llamaindex:8080
      - TARGET_CONTAINER=llamaindex-security-test-${TASK_ID:-default}${RUN_ID:+-${RUN_ID}}
    networks:
      - exploit_net

networks:
  # Internal network: attacker <-> target only, no internet access
  exploit_net:
    internal: true
  # Non-internal: target needs this for LLM API calls
  llm_net:
    driver: bridge
