# Docker Compose for OpenClaw 2026.1.30 Security Testing
# Vulnerable to message tool filePath sandbox bypass (CVE-OPENCLAW-2026-001)
# This configuration intentionally creates a vulnerable environment for security research

include:
  - ../../../attack-scripts/openclaw-2026.1.30/compose.yml

volumes:
  openclaw-source:
  host-secrets:

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-security-test-${TASK_ID:-message-filePath}
    hostname: openclaw
    networks:
      - openclaw-network
    ports:
      - "3000:3000"
    volumes:
      - openclaw-source:/app/openclaw-source
      - host-secrets:/host_secrets
    environment:
      - TASK_ID=${TASK_ID}
      - SANDBOX_ROOT=/sandbox
      - SANDBOX_MODE=non-main
    working_dir: /workspace

networks:
  openclaw-network:
    driver: bridge
