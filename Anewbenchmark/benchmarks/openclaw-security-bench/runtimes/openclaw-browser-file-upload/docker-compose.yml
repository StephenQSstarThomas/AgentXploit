# Docker Compose for OpenClaw Browser File Upload Arbitrary File Read Testing

include:
  - ../../../attack-scripts/openclaw-browser-file-upload/compose.yml

volumes:
  openclaw-source-file-upload:

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-security-test-${TASK_ID:-browser-file-upload}
    hostname: openclaw
    environment:
      - TASK_ID=${TASK_ID}
      - OPENCLAW_HOME=/root/.openclaw
      - NODE_ENV=production
    volumes:
      - openclaw-source-file-upload:/app/openclaw-source
    working_dir: /workspace
    ports:
      - "${HOST_PORT:-18789}:18789"
      - "18790:18790"  # Health check port
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Add security options to allow process inspection
    cap_add:
      - SYS_PTRACE

networks:
  openclaw-network:
    driver: bridge
